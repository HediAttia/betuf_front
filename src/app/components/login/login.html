<div class="login-page">

  <!-- Panneau gauche : branding -->
  <div class="login-left">

    <!-- Arcs tunnel décoratifs -->
    <svg class="tunnel-svg" viewBox="0 0 500 700" preserveAspectRatio="xMidYMid slice">
      <ellipse cx="250" cy="700" rx="420" ry="380" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="60"/>
      <ellipse cx="250" cy="700" rx="310" ry="280" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="40"/>
      <ellipse cx="250" cy="700" rx="200" ry="180" fill="none" stroke="rgba(245,158,11,0.12)" stroke-width="24"/>
      <ellipse cx="250" cy="700" rx="110" ry="100" fill="none" stroke="rgba(245,158,11,0.2)" stroke-width="14"/>
      <line x1="250" y1="0" x2="250" y2="700" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
      <line x1="0" y1="350" x2="500" y2="350" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </svg>

    <!-- Orbes flottants -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="left-content">
      <div class="brand-logo">🚇</div>
      <h1 class="brand-title">RTGS</h1>
      <div class="brand-badge">BETUF</div>
      <p class="brand-desc">Référentiel des Tunnels<br>et Gestion du Suivi</p>

      <div class="brand-stats">
        <div class="stat">
          <span class="stat-num">47</span>
          <span class="stat-lbl">Tunnels</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <span class="stat-num">12</span>
          <span class="stat-lbl">Régions</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <span class="stat-num">3</span>
          <span class="stat-lbl">Audits actifs</span>
        </div>
      </div>

      <p class="brand-footer">Ministère de l'Écologie — Bureau d'Études des Tunnels de France</p>
    </div>
  </div>

  <!-- Panneau droit : formulaire -->
  <div class="login-right">
    <!-- Décoration fond -->
    <svg class="right-decor-tl" viewBox="0 0 300 300" fill="none">
      <circle cx="150" cy="150" r="140" stroke="rgba(26,39,68,0.05)" stroke-width="2"/>
      <circle cx="150" cy="150" r="100" stroke="rgba(26,39,68,0.04)" stroke-width="1.5"/>
      <circle cx="150" cy="150" r="60" stroke="rgba(245,158,11,0.1)" stroke-width="1.5"/>
    </svg>
    <svg class="right-decor-br" viewBox="0 0 200 200" fill="none">
      <circle cx="100" cy="100" r="90" stroke="rgba(245,158,11,0.08)" stroke-width="2"/>
      <circle cx="100" cy="100" r="55" stroke="rgba(26,39,68,0.05)" stroke-width="1.5"/>
    </svg>
    <div class="login-card">

      <div class="card-top-bar"></div>

      <div class="form-header">
        <div class="form-icon">🔐</div>
        <h2>Bienvenue</h2>
        <p>Connectez-vous à votre espace sécurisé</p>
      </div>

      <div class="form-group">
        <label>Adresse email</label>
        <div class="input-wrapper">
          <svg class="field-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
          </svg>
          <input type="email"
                 class="form-input"
                 [(ngModel)]="email"
                 placeholder="prenom.nom@betuf.fr"
                 (keyup.enter)="login()">
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrapper">
          <svg class="field-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
          </svg>
          <input [type]="showPassword ? 'text' : 'password'"
                 class="form-input"
                 [(ngModel)]="password"
                 placeholder="••••••••"
                 (keyup.enter)="login()">
          <button class="toggle-pwd" (click)="showPassword = !showPassword" type="button">
            {{ showPassword ? '🙈' : '👁' }}
          </button>
        </div>
      </div>

      @if (erreur) {
        <div class="error-msg">
          <svg viewBox="0 0 20 20" fill="currentColor" class="err-icon">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          {{ erreur }}
        </div>
      }

      <button class="btn-login"
              (click)="login()"
              [disabled]="loading || !email || !password">
        @if (loading) {
          <span class="spinner"></span>
          <span>Connexion en cours...</span>
        } @else {
          <span>Se connecter</span>
          <svg class="btn-arrow" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        }
      </button>

      <p class="secure-note">
        <svg viewBox="0 0 20 20" fill="currentColor" class="lock-icon">
          <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        Connexion sécurisée — données chiffrées
      </p>

    </div>
  </div>

</div>
